name: live-tests

# Opt-in: runs the live tests against the real model via the API backend.
# Requires a repo secret ANTHROPIC_API_KEY. Trigger manually from the Actions tab.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # weekly (Mon 06:00 UTC) -- catch Claude Code CLI / model drift

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Run live tests (API backend)
        env:
          PROMPT_ENHANCER_LIVE_TESTS: "1"
          PROMPT_ENHANCER_BACKEND: "api"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -m live -q
