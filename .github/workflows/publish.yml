name: publish

# Publishes to PyPI via OIDC trusted publishing (no long-lived token).
# Set up a "pending publisher" for `prompt-preflight` on PyPI pointing at this workflow,
# and create a GitHub environment named `pypi`.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Generate SBOM (CycloneDX)
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment --output-format json --outfile dist/sbom.cdx.json || true
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC: required for trusted publishing & attestations
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Remove non-distributable artifacts
        run: rm -f dist/sbom.cdx.json
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
