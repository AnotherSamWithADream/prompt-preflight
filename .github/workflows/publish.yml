name: publish

# Publishes to PyPI via OIDC trusted publishing (no long-lived token).
# Set up a "pending publisher" for `prompt-preflight` on PyPI pointing at this workflow,
# and create a GitHub environment named `pypi`.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Generate SBOM (CycloneDX)
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment --output-format json --outfile dist/sbom.cdx.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC: required for trusted publishing & attestations
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Remove non-distributable artifacts
        run: rm -f dist/sbom.cdx.json
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
